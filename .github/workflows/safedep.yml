name: SafeDep CI Enforcement

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    name: Dependency Risk Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run SafeDep Scan
        # Enforce full baseline scan including devDependencies.
        # This will exit with code 1 if CRITICAL risks are found, failing the job.
        run: npx tsx src/cli/index.ts scan --include-dev

      - name: Run Engine Tests
        # Ensure core logic remains sound in the CI environment.
        run: npm test
